<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="volleyball.png" type="image/png">
    <title>Tournament Bracket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="popup.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0px;
            background-color: #f4f4f9;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        /* Scale wrapper: everything inside #bracketContainer will be scaled down 1/6 (≈0.1666667) */
        /* width:600% compensates so the scaled content still fills the viewport horizontally */
        #bracketContainer {
            transform: scale(0.6);     /* 0.6 */
            transform-origin: 0 0;            /* keep top-left as origin so layout stays predictable */
            /* use block formatting context so internal fixed/absolute elements behave consistently */
            display: block;
            position: relative;
        }
        /* Popups and overlays must still cover the viewport; make them paint relative to the viewport */
        /* We reset position for those inside the scaled wrapper so they behave like fixed elements */
        #bracketContainer .popup,
        #bracketContainer .popup-overlay,
        #bracketContainer .popup-overlay.hidden,
        #bracketContainer .popup.hidden {
            position: fixed !important;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #2c3e50;
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 120px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #2c3e50;
            padding: 10px 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: sticky;
            top: 120px;
            cursor: pointer;
            margin-left: auto;
        }

        .download-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        .bracket-container {
            padding: 40px;
            display: flex;
            gap: 80px;
            align-items: flex-start; /* ← aligns rounds to the top */
        }
        .tier {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* ← aligns rounds to the top */
        }
        .round {
            align-items: center;
            position: relative;
        }
        .round:not(:first-child) .match::before {
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            width: 40px;
            height: 2px;
            background: black;
        }
        .champMatch::before{
            content: "";
            position: absolute;
            top: 50%;
            right: 100%;
            width: 40px;
            height: 2px;
            background: black;
        }
        /* Horizontal Line */
        .match::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 100%;
            width: 40px;
            height: 2px;
            background: black;
        }
        
        /* Vertical Line */
        .vertical-line {
            content: "";
            position: absolute;
            left: 180px;
            bottom: 30px;
            width: 2px;
            height: 165%;
            background: black;
        }

        .match, .champMatch {
            width: 160px;
            height: 40px;
            background: #ddd;
            padding: 12px;
            margin: 40px 0; /* Controls spacing between matches */
            min-height: 60px;
            font-size: 25px;
            white-space: pre-line;
            overflow-wrap: break-word;
            border-radius: 5px;
            position: relative;
            text-align: center;
        }

        .match:hover, .champMatch:hover {
            background: #b7b7b7;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }


        .btn-primary, .btn-secondary {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        
        .btn-secondary{
            background: red;
            color: white;
        }

        .group-label, .team-label {
            flex: 1 1 120px; /* Grow and shrink, min width 120px */
            text-align: center;
        }

        .set-container {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;          /* allows wrapping if space runs out */
        }
        .set-container input {
            flex: 1 1 40px;            /* allows shrinking */
            max-width: 60px;          /* constrain size */
        }

        .date-official-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
        }

        .official-search {
            min-width: 150px;
            flex: 1;
        }
        .delete-match {
            margin-top: 10px;
            padding: 8px 12px;
            background-color: #cf4d4d;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        /* Make the layout adjust for smaller screens */
        @media (max-width: 768px) {
            .match-container {
                flex-direction: column;
                align-items: stretch;
            }

            .group-label, .team-label, .set-container, .date-official-container {
                width: 100%;
            }

            .set-container {
                justify-content: center;
            }

            .delete-match {
                align-self: center;
                width: 100%;
            }
            .popup {
                width: 80%;
                padding: 20px;
            }
            .match .champMatch{
                font-size: 12px;
            }
            #bracketContainer {
                transform: scale(0.2);     /* 0.6 */
                transform-origin: 0 0;            /* keep top-left as origin so layout stays predictable */
                /* use block formatting context so internal fixed/absolute elements behave consistently */
                display: block;
                position: relative;
            }
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-secondary:hover {
            background: rgb(222, 1, 1);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .hidden {
            display: none;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;
        }
        .line-color{
            background: black;
        }

        /* Tab styles */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background: #f0f0f0;
            cursor: pointer;
            font-size: 32px;
            font-weight: 500;
            color: #333;
            border-radius: 8px 8px 0 0;
            transition: all 0.3s ease;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            background: #e0e0e0;
        }

        .tab-button.active {
            background: #42bed3;
            color: white;
            border-bottom: 3px solid #31acc2;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
       
    </style>
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="darkmode.css">
</head>
<body>
    <script src = 'dataStorage.js'></script>
    <script src = 'Matchinfo.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <header id="sticky-header" class="sticky-header">
        <h2 id="header-title" style="cursor: pointer;">NTU Cup System</h2>
        <div class="navigation">
            <a href="visual_beta1.html" class="nav-link">
                <i class="fas fa-chart-bar"></i>
                <span class="nav-text">Brackets</span>
            </a>
            <a href="teamProfiles_v2.html" class="nav-link">
                <i class="fas fa-user-group"></i>
                <span class="nav-text">NTUCup Teams</span>
            </a>
        </div>
    </header>
    <div class="topbar">
        <a id="downloadPdfBtn" class="download-link">
            <i class="fas fa-file-pdf"></i> 
            <span class="nav-text">Download Bracket as PDF</span>
        </a>
    </div>
    <h1>Tournament Bracket</h1>
    <div id="bracketContainer" class="bracket-container"></div>
    <!-- Popup structure -->
    <div class="popup-overlay hidden" id="popup-overlay"></div>
    <div class="popup hidden" id="popup"></div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>
    <script>fetch('footer.html').then(response => response.text()).then(data => document.getElementById('footer-placeholder').innerHTML = data);</script>
    <script>
        document.getElementById('header-title').addEventListener('click', () => {
            window.location.href = 'index.html'; // Redirect to index.html
        });
        const Height = 40;
        document.addEventListener("DOMContentLoaded", () => {
            renderCalendar();

            // PDF download logic for the whole page
            document.getElementById('downloadPdfBtn').addEventListener('click', function() {
                // Use the body or a main wrapper for the whole page
                const element = document.body;
                const opt = {
                    margin:       0.2,
                    filename:     'tournament_fullpage.pdf',
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'in', format: 'a1', orientation: 'portrait' } // A1 for extra large
                };
                html2pdf().set(opt).from(element).save();
            });
        });
        function renderCalendar(){
            const bracketsData = fetchBrackets();
            const matches = fetchMatches();

            const container = document.getElementById("bracketContainer");
            container.innerHTML = ""; // Clear previous content
            
            // Get all unique tier prefixes
            const tierOrder = ['NewbieCup', 'Tier1', 'Tier2', 'Tier3', 'Tier4'];
            const activeTiers = tierOrder.filter(tierPrefix => 
                Object.keys(bracketsData).some(key => key.startsWith(tierPrefix))
            );

            // Create tab container
            const tabContainer = document.createElement("div");
            tabContainer.classList.add("tab-container");

            // Create tab buttons for each tier
            activeTiers.forEach((tier, index) => {
                const button = document.createElement("button");
                button.classList.add("tab-button");
                if (index === 0) button.classList.add("active"); // First tab is active by default
                button.textContent = tier;
                button.dataset.tier = tier;
                button.addEventListener("click", function() {
                    // Remove active class from all buttons and contents
                    document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
                    document.querySelectorAll(".tab-content").forEach(content => content.classList.remove("active"));
                    
                    // Add active class to clicked button and corresponding content
                    this.classList.add("active");
                    document.getElementById(`tab-${tier}`).classList.add("active");
                });
                tabContainer.appendChild(button);
            });

            container.appendChild(tabContainer);

            // Create content for each tier
            activeTiers.forEach((tier, index) => {
                const tabContent = document.createElement("div");
                tabContent.id = `tab-${tier}`;
                tabContent.classList.add("tab-content");
                if (index === 0) tabContent.classList.add("active"); // First tab content is active by default

                // Get all brackets for this tier
                const tiersForThisTier = Object.entries(bracketsData).filter(([key]) => key.startsWith(tier));

                tiersForThisTier.forEach(([tierName, bracket]) => {
                    const title = document.createElement("h2");
                    title.textContent = tierName;
                    tabContent.appendChild(title);

                    const bracketContainer = document.createElement("div");
                    bracketContainer.classList.add("bracket-container");
                    let mar = 40;
                    let top = 0;

                    bracket.roundMatchIds.forEach((round, roundIndex) => {
                        const roundDiv = document.createElement("div");
                        roundDiv.classList.add("round");
                        const roundTitle = document.createElement("h3");
                        roundTitle.textContent = `Round ${roundIndex + 1}`;
                        roundDiv.appendChild(roundTitle);

                        round.forEach((matchId, matchIndex) => {
                            const match = matches.find(m => m.id == matchId);
                            const teamAFirst2 = match.teamAID ? match.teamAID.substring(0, 2) : '';
                            const teamBFirst2 = match.teamBID ? match.teamBID.substring(0, 2) : '';
                            
                            if (match !== undefined) {
                                const matchDiv = document.createElement("div");
                        
                                if(match.nextMatch !== null){
                                    matchDiv.classList.add("match");
                                    matchDiv.style.marginBottom = `${mar}px`;
                                } else {
                                    matchDiv.classList.add("champMatch")
                                    matchDiv.style.marginBottom = `100px`
                                }

                                if (matchIndex === 0) {
                                    matchDiv.style.marginTop = `${top}px`;
                                }

                                const date = match.date ?? '';
                                const status = match.status === false ? "To Be Played" : (match.winner ? `Winner: ${match.winner === match.teamAID ? teamAFirst2 : teamBFirst2}` : 'To Be Played');

                                const teamAHtml = (match.winner && match.winner === match.teamAID) ? `<strong style="color: #4fa7d1;">${teamAFirst2}</strong>` : teamAFirst2;
                                const teamBHtml = (match.winner && match.winner === match.teamBID) ? `<strong style="color: #4fa7d1;">${teamBFirst2}</strong>` : teamBFirst2;
                                const vsHtml = `${teamAHtml} vs ${teamBHtml}`;

                                if (match.teamAID === match.teamBID && match.teamAID !== null) {
                                    matchDiv.innerHTML = `${teamAFirst2}`;
                                } else {
                                    matchDiv.innerHTML = vsHtml;
                                }

                                showMatchinfo(matchDiv, match);
                                roundDiv.appendChild(matchDiv);

                                // create connecting lines
                                if (matchIndex % 2 === 1 && match.nextMatch !== null) {
                                    const verticalLine = document.createElement("div");
                                    verticalLine.style.position = "absolute";
                                    verticalLine.style.left = 223 + "px";
                                    verticalLine.style.bottom = Height + "px"; 
                                    verticalLine.style.width = "2px";
                                    verticalLine.style.height = `${mar + 2 * Height+ 6}px`;
                                    verticalLine.classList.add("line-color");
                                    matchDiv.appendChild(verticalLine);
                                }
                            }
                        });

                        mar = mar * 2 + Height * 2 + 3;
                        top = mar / 2;
                        bracketContainer.appendChild(roundDiv);
                    });

                    tabContent.appendChild(bracketContainer);
                });

                container.appendChild(tabContent);
            });
        }
    </script>
</body>
</html>
